version: "3.9"

networks:
  mindforge_dev:
    driver: bridge

volumes:
  mindforge_pg_dev:
  mindforge_redis_dev:
  mindforge_go_cache:
  mindforge_minio_dev:
  mindforge_piston_dev:

services:
  postgres:
    image: postgres:16-alpine
    container_name: mindforge_postgres_dev
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - mindforge_pg_dev:/var/lib/postgresql/data
    networks:
      - mindforge_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: mindforge_redis_dev
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    volumes:
      - mindforge_redis_dev:/data
    networks:
      - mindforge_dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: mindforge_minio_dev
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: mindforge
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mindforge_minio_dev:/data
    networks:
      - mindforge_dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    image: golang:1.26-alpine
    container_name: mindforge_backend_dev
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
      - mindforge_go_cache:/root/go
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    networks:
      - mindforge_dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      piston:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    command: sh -c "apk add --no-cache docker-cli && go mod download && go run ./cmd/server"

  piston:
    image: ghcr.io/engineer-man/piston
    container_name: mindforge_piston_dev
    restart: unless-stopped
    privileged: true
    volumes:
      - mindforge_piston_dev:/piston
    ports:
      - "2000:2000"
    networks:
      - mindforge_dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2000/api/v2/runtimes || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  labproxy:
    image: golang:1.26-alpine
    container_name: mindforge_labproxy_dev
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
      - mindforge_go_cache:/root/go
    environment:
      LABPROXY_PORT: "8081"
      LABPROXY_DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LABPROXY_REDIS_URL: redis://redis:6379/0
      LABPROXY_JWT_SECRET: ${JWT_SECRET}
      LABPROXY_JWT_ISSUER: mindforge-labproxy
    ports:
      - "8081:8081"
    networks:
      - mindforge_dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: go run ./cmd/labproxy

  adminer:
    image: adminer:latest
    container_name: mindforge_adminer_dev
    restart: unless-stopped
    ports:
      - "8082:8080"
    networks:
      - mindforge_dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
